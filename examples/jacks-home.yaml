# =============================================================================
# Jack's Home - "Pretty" dashboard (Air HA Dashboard / apple-home-card)
#
# This is the live export of the /dashboard-pretty dashboard. To use:
#   Settings > Dashboards > Pretty > Edit > (3 dots) > Raw configuration editor
#   then paste this whole file.
#
# Views: Home, Rooms, Cameras, House, Vacuum.
#   - No swipe/pager view (removed - use the view tabs instead).
#   - The Vacuum view mirrors the kiosk's full Roborock control (map picker,
#     room toggles, segment cleaning, suction levels, mop/maintenance/status).
#     It needs custom:button-card + custom:mushroom-vacuum-card installed, plus
#     the rocky_* / vacuum_room_* helper entities.
# =============================================================================
