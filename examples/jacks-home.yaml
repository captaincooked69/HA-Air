- title: Vacuum
  path: vacuum
  icon: mdi:robot-vacuum
  cards:
  - type: custom:mushroom-vacuum-card
    entity: vacuum.rocky
    icon_animation: true
    show_state: true
  - type: vertical-stack
    cards:
    - type: horizontal-stack
      cards:
      - type: custom:button-card
        entity: select.rocky_selected_map
        name: Upstairs
        icon: mdi:home-floor-1
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.rocky_selected_map
            option: Upstairs
        styles:
          card:
          - border-radius: 10px
          - background-color: "[[[return entity.state==='Upstairs'?'var(--primary-color)':'var(--card-background-color)']]]"
          - border: "[[[return entity.state==='Upstairs'?'2px solid var(--primary-color)':'2px solid rgba(var(--rgb-primary-text-color),0.15)']]]"
          name:
          - color: "[[[return entity.state==='Upstairs'?'white':'var(--primary-text-color)']]]"
          icon:
          - color: "[[[return entity.state==='Upstairs'?'white':'var(--state-icon-color)']]]"
      - type: custom:button-card
        entity: select.rocky_selected_map
        name: Downstairs
        icon: mdi:home-floor-0
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.rocky_selected_map
            option: Downstairs
        styles:
          card:
          - border-radius: 10px
          - background-color: "[[[return entity.state==='Downstairs'?'var(--primary-color)':'var(--card-background-color)']]]"
          - border: "[[[return entity.state==='Downstairs'?'2px solid var(--primary-color)':'2px solid rgba(var(--rgb-primary-text-color),0.15)']]]"
          name:
          - color: "[[[return entity.state==='Downstairs'?'white':'var(--primary-text-color)']]]"
          icon:
          - color: "[[[return entity.state==='Downstairs'?'white':'var(--state-icon-color)']]]"
    - type: conditional
      conditions:
      - entity: select.rocky_selected_map
        state: Upstairs
      card:
        type: picture-entity
        entity: image.rocky_upstairs
        show_name: false
        show_state: false
    - type: conditional
      conditions:
      - entity: select.rocky_selected_map
        state: Downstairs
      card:
        type: picture-entity
        entity: image.rocky_downstairs
        show_name: false
        show_state: false
  - type: custom:button-card
    name: SELECT ROOMS
    show_icon: false
    tap_action:
      action: none
    styles:
      card:
      - background: none
      - padding: 4px 0 0 0
