# ─────────────────────────────────────────────────────────────────────────────
# Jack's Home — Apple Home–style dashboard (v1, built from your entity registry)
#
# HOW TO USE
#   Dashboard ▸ Edit ▸ ⋮ ▸ Raw configuration editor ▸ paste this whole file.
#   (Back up your current raw config first.)
#
# WHAT'S INCLUDED
#   Curated, room-grouped tiles for the things you actually touch. Plumbing is
#   intentionally left out — browser_mod_* sensors, *_debug_*, per-speaker
#   bass/treble/crossfade config switches, update.*, individual *_browser_width
#   sensors, BLE distance trackers, etc. Add any back if you want them.
#
# ASSUMPTIONS (your areas are unset, so rooms are inferred from names — fix freely)
#   • media_player.living_room   → Apple TV (has remote + keyboard_focus)
#   • media_player.living_room_tv → Sony Bravia
#   • Sonos: arc / kitchen / patio / patio_2 are the real speakers; the _2/_3
#     duplicates (AirSonos / Music Assistant mirrors) are omitted.
#   • alarm_control_panel.* are eufy HomeBase guard modes → grouped under Security.
#   • AC is script-driven (no climate entity) → "Climate" section of scripts.
# ─────────────────────────────────────────────────────────────────────────────

